  <!-- Cart Wheels -->
  <circle cx="75" cy="130" r="10" fill="none" stroke="#FF6B81" stroke-width="2.5"/>
  <circle cx="125" cy="130" r="10" fill="none" stroke="#FF6B81" stroke-width="2.5"/>
  
  <!-- Sad Face on Cart -->
  <circle cx="90" cy="95" r="2" fill="#FF6B81"/>
  <circle cx="110" cy="95" r="2" fill="#FF6B81"/>
  <path d="M92 105 Q100 95 108 105" fill="none" stroke="#FF6B81" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cross mark -->
  <line x1="135" y1="75" x2="145" y2="85" stroke="#FF6B81" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="75" x2="135" y2="85" stroke="#FF6B81" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Decorative elements -->
